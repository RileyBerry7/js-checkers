<!DOCTYPE html>
<html Lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Checkers</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <div id="board"></div>
        <div id="captured-opponent" class="captured"></div>
        <div id="captured-own"      class="captured"></div>
    </div>

    <div id="calculator">
        <input id="display" readonly">
        <div id="keys">
            <button onclick="appendTo('+')" class="operator-btn">+</button>
            <button onclick="appendTo('7')">7</button>
            <button onclick="calculate()">=</button>
            <button onclick="clearDisplay()" class="operator-btn">C</button>

        </div>
        <input id="turn_indicator" readonly">

    </div>

    <script src="index.js"></script>
    
</body>
</html> <!-- closing tag -->
